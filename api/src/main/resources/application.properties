spring.application.name=api

# Enable the H2 console for web access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configure the data source
# Use jdbc:h2:mem:testdb for an in-memory database that is created and destroyed with the app
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configure JPA/Hibernate
# "update" will automatically generate tables based on your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect